<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Celtrans</title>
  <style>
    :root {
      /* AJUSTE AQUI: velocidade dos efeitos */
      --float-duration: 18s;
      --wave-duration: 10s;
      --glow-duration: 14s;

      /* AJUSTE AQUI: intensidade do movimento */
      --zoom-min: 1;
      --zoom-max: 1.035;
      --drift-x: 0.7%;
      --drift-y: 0.9%;

      /* AJUSTE AQUI: intensidade da luz/onda */
      --wave-opacity: 0.22;
      --texture-opacity: 0.32;
      --corner-opacity: 0.88;

      --bg-dark: #06124a;
      --bg-mid: #0a1d7c;
      --bg-light: #14319c;
      --green: #45f274;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      color: var(--white);
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 50%, rgba(46, 90, 255, 0.18), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(69, 242, 116, 0.08), transparent 18%),
        radial-gradient(circle at 18% 82%, rgba(69, 242, 116, 0.06), transparent 18%),
        linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 52%, var(--bg-light) 100%);
    }

    /* Onda principal mais visível */
    .screen::before {
      content: "";
      position: absolute;
      inset: -14%;
      background:
        linear-gradient(
          108deg,
          transparent 18%,
          rgba(255, 255, 255, 0.03) 30%,
          rgba(255, 255, 255, var(--wave-opacity)) 44%,
          rgba(69, 242, 116, 0.09) 50%,
          rgba(255, 255, 255, 0.06) 56%,
          transparent 68%
        );
      filter: blur(18px);
      mix-blend-mode: screen;
      animation: wavePass var(--wave-duration) linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    /* textura diagonal mais aparente */
    .screen::after {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        repeating-linear-gradient(
          115deg,
          transparent 0 26px,
          rgba(255, 255, 255, 0.02) 26px 40px,
          transparent 40px 78px
        );
      opacity: var(--texture-opacity);
      animation: textureMove calc(var(--wave-duration) * 1.7) linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      inset: -12%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 30%, rgba(255, 255, 255, 0.04), transparent 18%),
        radial-gradient(circle at 76% 34%, rgba(69, 242, 116, 0.08), transparent 22%),
        radial-gradient(circle at 55% 60%, rgba(255, 255, 255, 0.03), transparent 26%);
      filter: blur(22px);
      animation: ambientGlow var(--glow-duration) ease-in-out infinite alternate;
    }

    .corner {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .corner--top-right {
      top: 0;
      right: 0;
      width: min(28vw, 440px);
      aspect-ratio: 1.65 / 1;
      background: linear-gradient(135deg, rgba(69, 242, 116, var(--corner-opacity)), rgba(69, 242, 116, 0) 68%);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      animation: cornerPulse 8s ease-in-out infinite alternate;
    }

    .corner--bottom-left {
      bottom: 0;
      left: 0;
      width: min(28vw, 440px);
      aspect-ratio: 1.65 / 1;
      background: linear-gradient(315deg, rgba(69, 242, 116, 0.46), rgba(69, 242, 116, 0) 72%);
      clip-path: polygon(0 100%, 0 0, 100% 100%);
      animation: cornerPulse 10s ease-in-out infinite alternate-reverse;
    }

    /* ÁREA CENTRAL SEM O ÍCONE VERDE */
    .center-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(86vw, 1320px);
      transform: translate(-50%, -50%);
      z-index: 3;
      animation: heroFloat var(--float-duration) ease-in-out infinite alternate;
      will-change: transform;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .copy h1 {
      font-size: clamp(76px, 8.8vw, 182px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.045em;
      text-transform: uppercase;
      text-shadow:
        0 3px 22px rgba(0, 0, 0, 0.18),
        0 0 18px rgba(255, 255, 255, 0.05);
    }

    .copy .sub {
      margin-top: clamp(10px, 1.2vh, 16px);
      font-size: clamp(18px, 2vw, 42px);
      line-height: 1;
      letter-spacing: 0.23em;
      font-weight: 300;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.99;
    }

    .copy .tag {
      margin-top: clamp(18px, 2vh, 28px);
      font-size: clamp(20px, 1.8vw, 36px);
      line-height: 1;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--green);
      text-shadow:
        0 0 20px rgba(69, 242, 116, 0.12),
        0 0 38px rgba(69, 242, 116, 0.04);
    }

    @keyframes heroFloat {
      0% {
        transform: translate(-50%, -50%) scale(var(--zoom-min));
      }
      50% {
        transform: translate(calc(-50% + var(--drift-x)), calc(-50% - var(--drift-y))) scale(1.018);
      }
      100% {
        transform: translate(calc(-50% - var(--drift-x)), calc(-50% + var(--drift-y))) scale(var(--zoom-max));
      }
    }

    @keyframes wavePass {
      0% {
        transform: translate3d(-28%, 0, 0) rotate(-1.5deg);
      }
      50% {
        transform: translate3d(0, -1%, 0) rotate(0deg);
      }
      100% {
        transform: translate3d(28%, 1%, 0) rotate(1.5deg);
      }
    }

    @keyframes textureMove {
      0% {
        transform: translate3d(12%, 0, 0);
      }
      100% {
        transform: translate3d(-12%, 0, 0);
      }
    }

    @keyframes ambientGlow {
      0% {
        transform: scale(1) translate3d(0, 0, 0);
        opacity: 0.7;
      }
      100% {
        transform: scale(1.08) translate3d(1.5%, -1%, 0);
        opacity: 1;
      }
    }

    @keyframes cornerPulse {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }
      100% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    @media (max-width: 960px) {
      .center-wrap {
        width: min(92vw, 760px);
      }

      .copy .sub {
        white-space: normal;
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Painel institucional Celtrans">
    <div class="corner corner--top-right"></div>
    <div class="corner corner--bottom-left"></div>
    <div class="glow"></div>

    <section class="center-wrap">
      <div class="hero">
        <div class="copy">
          <h1>CELTRANS</h1>
          <p class="sub">SUPPLY CHAIN INTEGRATED</p>
          <p class="tag">TORRE DE CONTROLE - FINANCEIRO</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
